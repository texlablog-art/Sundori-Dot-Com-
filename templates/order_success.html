{% extends "base.html" %}
{% block content %}
<canvas id="confetti-canvas" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 9999;"></canvas>

<div class="container py-5 d-flex justify-content-center align-items-center" style="min-height: 85vh; overflow: hidden;">
    
    <div class="gift-wrapper">
        
        <!-- Top Ribbon -->
        <div class="gift-ribbon"></div>

        <!-- Card Body -->
        <div class="gift-body text-center">
            
            <!-- Decorative Glows -->
            <div class="gift-glow-tl"></div>
            <div class="gift-glow-tr"></div>

            <!-- Gift Icon -->
            <div class="gift-icon-wrapper mx-auto mb-4">
                <i class="fa-solid fa-gift"></i>
            </div>

            <!-- Title -->
            <h1 class="gift-title">Surprise!</h1>
            <h4 class="fw-bold mb-3" style="color: var(--text-primary); font-family: 'Playfair Display', serif;">
                Your Order is Confirmed
            </h4>
            <p class="mb-4 px-lg-3" style="color: var(--text-muted); font-size: 0.95rem; line-height: 1.7;">
                The moment you've been waiting for is here! We've received your order and we're celebrating with you.
            </p>

            <!-- Order ID Box -->
            <div class="gift-id-box mx-auto my-4">
                <div class="gift-id-inner">
                    <span class="gift-id-label">Tracking Reference</span>
                    <div class="d-flex align-items-center justify-content-center mt-2 gap-2">
                        <h2 class="gift-id-number m-0" id="orderIdText">{{ order_id }}</h2>
                        <button class="gift-copy-btn" onclick="copyId(this)" title="Copy Order ID">
                            <i class="fa-regular fa-copy"></i>
                        </button>
                    </div>
                </div>
            </div>

            <!-- Green Checkmark -->
            <div class="gift-check-wrapper mx-auto mb-4">
                <div class="gift-check-circle">
                    <i class="fa-solid fa-check"></i>
                </div>
            </div>

            <!-- Buttons -->
            <div class="d-grid gap-3">
                <a href="/track?order_id={{ order_id }}" class="gift-track-btn text-decoration-none text-center">
                    <i class="fa-solid fa-magnifying-glass-location me-2"></i> TRACK YOUR SURPRISE
                </a>
                <a href="/" class="text-decoration-none text-center gift-keep-shopping">
                    Keep Shopping
                </a>
            </div>
        </div>
    </div>
</div>

<!-- Copy Toast -->
<div id="copyToast" class="gift-toast">
    <i class="fa-solid fa-circle-check me-2" style="color: var(--green);"></i>
    <span>Order ID Copied!</span>
</div>

<style>
    :root {
        --black: #0D0D0D;
        --black-light: #141414;
        --black-medium: #1A1A1A;
        --black-soft: #232323;
        --black-card: #161616;
        --black-border: #2E2E2E;
        --orange: #FF6B2B;
        --orange-bright: #FF8548;
        --orange-light: #FFAA75;
        --orange-pale: #FFD4B8;
        --orange-dark: #D9550F;
        --orange-deeper: #B34508;
        --orange-glow: rgba(255, 107, 43, 0.3);
        --orange-glow-strong: rgba(255, 107, 43, 0.45);
        --orange-subtle: rgba(255, 107, 43, 0.08);
        --orange-subtle-border: rgba(255, 107, 43, 0.15);
        --red: #E8363A;
        --red-glow: rgba(232, 54, 58, 0.25);
        --green: #22C55E;
        --green-dark: #16A34A;
        --green-glow: rgba(34, 197, 94, 0.3);
        --text-primary: #F0F0F0;
        --text-secondary: #B0B0B0;
        --text-muted: #6E6E6E;
    }

    /* ══════════════════════════════════
       GIFT WRAPPER
    ══════════════════════════════════ */
    .gift-wrapper {
        width: 100%;
        max-width: 500px;
        position: relative;
        background: var(--black-card);
        border-radius: 32px;
        border: 1px solid var(--black-border);
        z-index: 10;
        overflow: visible;
        animation: giftBounceIn 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4), 0 0 80px var(--orange-glow);
    }
    @keyframes giftBounceIn {
        0% { opacity: 0; transform: translateY(-40px) scale(0.9); }
        100% { opacity: 1; transform: translateY(0) scale(1); }
    }

    /* ── Ribbon ── */
    .gift-ribbon {
        height: 6px;
        background: linear-gradient(to right, var(--orange-dark), var(--orange), var(--orange-bright), var(--green));
        border-radius: 32px 32px 0 0;
    }

    /* ── Body ── */
    .gift-body {
        padding: 2.5rem 2rem;
        position: relative;
    }

    /* ── Decorative Glows ── */
    .gift-glow-tl {
        position: absolute;
        top: -60px;
        left: -60px;
        width: 180px;
        height: 180px;
        background: radial-gradient(circle, var(--orange-glow) 0%, transparent 70%);
        border-radius: 50%;
        pointer-events: none;
        animation: pulseGlow 3s ease-in-out infinite;
    }
    .gift-glow-tr {
        position: absolute;
        bottom: -40px;
        right: -40px;
        width: 150px;
        height: 150px;
        background: radial-gradient(circle, var(--green-glow) 0%, transparent 70%);
        border-radius: 50%;
        pointer-events: none;
        animation: pulseGlow 3s ease-in-out infinite 1.5s;
    }
    @keyframes pulseGlow {
        0%, 100% { opacity: 0.4; transform: scale(1); }
        50% { opacity: 0.8; transform: scale(1.1); }
    }

    /* ── Gift Icon ── */
    .gift-icon-wrapper {
        width: 90px;
        height: 90px;
        border-radius: 50%;
        background: linear-gradient(135deg, var(--orange-subtle), rgba(255, 107, 43, 0.12));
        border: 1px solid var(--orange-subtle-border);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 2.5rem;
        color: var(--orange);
        animation: rotateGift 3s infinite ease-in-out;
        position: relative;
        box-shadow: 0 0 30px var(--orange-glow);
    }
    .gift-icon-wrapper::after {
        content: '';
        position: absolute;
        inset: -6px;
        border-radius: 50%;
        border: 1px dashed rgba(255, 107, 43, 0.18);
        animation: spinSlow 20s linear infinite;
    }
    @keyframes rotateGift {
        0%, 100% { transform: rotate(-5deg) scale(1); }
        50% { transform: rotate(5deg) scale(1.08); }
    }
    @keyframes spinSlow {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
    }

    /* ── Title ── */
    .gift-title {
        font-family: 'Playfair Display', serif;
        color: var(--orange);
        font-size: 3rem;
        font-weight: 700;
        margin-bottom: 0;
        text-shadow: 0 2px 20px var(--orange-glow);
        letter-spacing: 0.02em;
    }

    /* ── Order ID Box ── */
    .gift-id-box {
        width: 100%;
        max-width: 380px;
    }
    .gift-id-inner {
        background: var(--black-medium);
        border: 2px dashed var(--black-border);
        border-radius: 20px;
        padding: 20px;
        position: relative;
    }
    .gift-id-inner::before {
        content: '';
        position: absolute;
        inset: -1px;
        border-radius: 20px;
        background: linear-gradient(135deg, rgba(255, 107, 43, 0.05) 0%, transparent 50%, rgba(34, 197, 94, 0.05) 100%);
        pointer-events: none;
        z-index: 0;
    }
    .gift-id-label {
        display: block;
        font-size: 0.68rem;
        font-weight: 700;
        color: var(--text-muted);
        text-transform: uppercase;
        letter-spacing: 0.12em;
        position: relative;
        z-index: 1;
    }
    .gift-id-number {
        font-family: 'Playfair Display', serif;
        font-weight: 800;
        color: var(--orange);
        font-size: 1.6rem;
        letter-spacing: 3px;
        position: relative;
        z-index: 1;
    }
    .gift-copy-btn {
        width: 40px;
        height: 40px;
        border-radius: 12px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        background: var(--black-soft);
        border: 1px solid var(--black-border);
        color: var(--orange);
        font-size: 1rem;
        cursor: pointer;
        transition: all 0.25s ease;
        flex-shrink: 0;
        position: relative;
        z-index: 1;
    }
    .gift-copy-btn:hover {
        background: linear-gradient(135deg, var(--orange-dark), var(--orange));
        color: #fff;
        border-color: var(--orange);
        transform: scale(1.1);
        box-shadow: 0 4px 14px var(--orange-glow);
    }

    /* ── Green Checkmark ── */
    .gift-check-wrapper {
        width: 50px;
        height: 50px;
        position: relative;
    }
    .gift-check-circle {
        width: 50px;
        height: 50px;
        border-radius: 50%;
        background: linear-gradient(135deg, var(--green-dark), var(--green));
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 1.3rem;
        color: #fff;
        animation: checkPulse 2s infinite;
        box-shadow: 0 0 0 0 var(--green-glow);
    }
    @keyframes checkPulse {
        0% { box-shadow: 0 0 0 0 var(--green-glow); }
        70% { box-shadow: 0 0 0 15px transparent; }
        100% { box-shadow: 0 0 0 0 transparent; }
    }

    /* ── Track Button ── */
    .gift-track-btn {
        display: flex;
        align-items: center;
        justify-content: center;
        background: linear-gradient(135deg, var(--orange-dark), var(--orange), var(--orange-bright));
        color: #fff;
        border: none;
        padding: 15px;
        border-radius: 16px;
        font-weight: 800;
        font-size: 0.92rem;
        letter-spacing: 0.03em;
        cursor: pointer;
        transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        box-shadow: 0 4px 16px var(--orange-glow);
        position: relative;
        overflow: hidden;
    }
    .gift-track-btn::before {
        content: '';
        position: absolute;
        top: 0;
        left: -100%;
        width: 100%;
        height: 100%;
        background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent);
        transition: left 0.5s ease;
    }
    .gift-track-btn:hover::before {
        left: 100%;
    }
    .gift-track-btn:hover {
        box-shadow: 0 8px 32px var(--orange-glow-strong);
        transform: scale(1.04);
        color: #fff;
    }

    /* ── Keep Shopping Link ── */
    .gift-keep-shopping {
        color: var(--text-muted);
        font-weight: 600;
        font-size: 0.9rem;
        transition: all 0.25s ease;
    }
    .gift-keep-shopping:hover {
        color: var(--orange);
    }

    /* ── Copy Toast ── */
    .gift-toast {
        position: fixed;
        bottom: 30px;
        left: 50%;
        transform: translateX(-50%) translateY(100px);
        background: var(--black-card);
        border: 1px solid var(--green);
        border-radius: 14px;
        padding: 14px 24px;
        font-size: 0.88rem;
        color: var(--text-primary);
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4), 0 0 20px var(--green-glow);
        z-index: 99999;
        opacity: 0;
        transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        white-space: nowrap;
    }
    .gift-toast-show {
        transform: translateX(-50%) translateY(0);
        opacity: 1;
    }

    /* ── Responsive ── */
    @media (max-width: 576px) {
        .gift-wrapper { border-radius: 24px; margin: 0 8px; }
        .gift-ribbon { border-radius: 24px 24px 0 0; }
        .gift-body { padding: 2rem 1.5rem; }
        .gift-title { font-size: 2.2rem; }
        .gift-id-number { font-size: 1.3rem; letter-spacing: 2px; }
        .gift-icon-wrapper { width: 72px; height: 72px; font-size: 2rem; }
        .gift-track-btn { padding: 13px; font-size: 0.85rem; border-radius: 14px; }
    }
</style>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
<script>
    // Trigger Confetti on Load with Orange/Green/Black palette
    window.onload = function() {
        var duration = 3.5 * 1000;
        var end = Date.now() + duration;

        (function frame() {
            confetti({
                particleCount: 3,
                angle: 60,
                spread: 55,
                origin: { x: 0 },
                colors: ['#FF6B2B', '#22C55E', '#FFAA75', '#FF8548', '#D9550F', '#0D0D0D']
            });
            confetti({
                particleCount: 3,
                angle: 120,
                spread: 55,
                origin: { x: 1 },
                colors: ['#FF6B2B', '#22C55E', '#FFAA75', '#FF8548', '#D9550F', '#0D0D0D']
            });

            if (Date.now() < end) {
                requestAnimationFrame(frame);
            }
        }());
    };

    function copyId(btn) {
        const id = document.getElementById('orderIdText').innerText;
        navigator.clipboard.writeText(id).then(() => {
            btn.innerHTML = '<i class="fa-solid fa-check" style="color: var(--green);"></i>';
            showToast();
            setTimeout(() => {
                btn.innerHTML = '<i class="fa-regular fa-copy"></i>';
            }, 2000);
        });
    }

    function showToast() {
        const toast = document.getElementById('copyToast');
        toast.classList.add('gift-toast-show');
        setTimeout(() => toast.classList.remove('gift-toast-show'), 2500);
    }
</script>

{% endblock %}
