{% extends "admin_base.html" %}

{% block content %}
<div class="d-flex justify-content-center align-items-center" style="height: 80vh;">
    <div class="login-card">
        <div class="text-center mb-4">
            <div class="login-logo-wrap mx-auto mb-3">
                <img src="https://i.ibb.co.com/tpPjb0xj/660454989-122101239710887177_7138871245083009459_n.jpg" alt="Sundori Dot Com" class="login-logo-img">
            </div>
            <h3 class="login-title">Admin Login</h3>
            <p class="login-subtitle">Sundori Dot Com</p>
            <div class="login-divider mx-auto"></div>
        </div>

        <form method="POST">
            <div class="mb-3">
                <label class="login-label">Username</label>
                <div class="login-input-wrapper">
                    <span class="login-input-icon"><i class="fa-solid fa-user"></i></span>
                    <input type="text" name="user" class="login-input" placeholder="Enter username" required>
                </div>
            </div>
            <div class="mb-4">
                <label class="login-label">Password</label>
                <div class="login-input-wrapper">
                    <span class="login-input-icon"><i class="fa-solid fa-lock"></i></span>
                    <input type="password" name="pass" class="login-input" placeholder="Enter password" required>
                </div>
            </div>
            <button type="submit" class="login-btn">
                <i class="fa-solid fa-right-to-bracket me-2"></i>Sign In
            </button>
        </form>

        <div class="text-center mt-4 pt-3" style="border-top: 1px solid var(--black-border);">
            <p class="login-footer-text">
                <i class="fa-solid fa-lock me-1"></i> Secured Admin Access
            </p>
        </div>
    </div>
</div>

<style>
:root{--black:#080808;--black-soft:#0C0C0C;--black-elevated:#141414;--black-card:#161616;--black-input:#1A1A1A;--black-hover:#1E1E1E;--black-border:#232323;--orange:#FF6B00;--orange-light:#FF8C33;--orange-dark:#E05E00;--orange-glow:rgba(255,107,0,0.18);--orange-glow-strong:rgba(255,107,0,0.30);--orange-subtle:rgba(255,107,0,0.06);--text-primary:#F0F0F0;--text-secondary:#999999;--text-muted:#5A5A5A;--text-dim:#3A3A3A}
.login-card{background:var(--black-card);border:1px solid var(--black-border);border-radius:24px;padding:2.5rem 2rem;width:380px;max-width:92vw;position:relative;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,0.4)}
.login-card::before{content:'';position:absolute;top:-60px;left:50%;transform:translateX(-50%);width:200px;height:200px;background:radial-gradient(circle,var(--orange-glow) 0%,transparent 70%);border-radius:50%;pointer-events:none}
.login-card::after{content:'';position:absolute;bottom:-40px;right:-40px;width:140px;height:140px;background:radial-gradient(circle,rgba(255,186,8,0.1) 0%,transparent 70%);border-radius:50%;pointer-events:none}
.login-logo-wrap{width:72px;height:72px;border-radius:18px;overflow:hidden;border:2px solid rgba(255,107,0,0.15);box-shadow:0 8px 24px var(--orange-glow);transition:all 0.3s ease}
.login-logo-wrap:hover{transform:scale(1.06) rotate(-2deg);box-shadow:0 12px 32px var(--orange-glow-strong)}
.login-logo-img{width:100%;height:100%;object-fit:cover;display:block}
.login-title{font-family:'Playfair Display',serif;font-weight:700;font-size:1.5rem;color:var(--text-primary);margin-bottom:2px}
.login-subtitle{font-size:0.8rem;color:var(--orange);font-weight:600;letter-spacing:0.03em;margin-bottom:0}
.login-divider{width:40px;height:3px;background:var(--orange);border-radius:3px;margin-top:12px}
.login-label{font-size:0.72rem;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:6px;display:block}
.login-input-wrapper{display:flex;align-items:stretch;border:1px solid var(--black-border);border-radius:12px;overflow:hidden;transition:all 0.2s ease;background:var(--black-input)}
.login-input-wrapper:focus-within{border-color:var(--orange);box-shadow:0 0 0 3px var(--orange-glow)}
.login-input-icon{padding:0 14px;display:flex;align-items:center;color:var(--text-dim);font-size:0.85rem;background:var(--black-hover);border-right:1px solid var(--black-border);transition:color 0.2s}
.login-input-wrapper:focus-within .login-input-icon{color:var(--orange)}
.login-input{flex:1;background:transparent!important;border:none!important;color:var(--text-primary)!important;padding:11px 14px;font-size:0.9rem;box-shadow:none!important;outline:none!important}
.login-input::placeholder{color:var(--text-dim)!important;font-size:0.85rem}
.login-btn{width:100%;background:var(--orange);color:var(--black);border:none;padding:13px;border-radius:14px;font-weight:700;font-size:0.95rem;cursor:pointer;transition:all 0.3s ease;display:flex;align-items:center;justify-content:center;position:relative;z-index:1}
.login-btn:hover{background:var(--orange-dark);box-shadow:0 8px 30px var(--orange-glow-strong);transform:translateY(-2px)}
.login-btn:active{transform:translateY(0);box-shadow:0 4px 15px var(--orange-glow)}
.login-footer-text{font-size:0.72rem;color:var(--text-dim);margin:0}
@media(max-width:480px){.login-card{padding:2rem 1.5rem;border-radius:20px}.login-logo-wrap{width:60px;height:60px;border-radius:14px}.login-title{font-size:1.3rem}}
</style>

{% endblock %}
